server {
    listen 80;

    # /api/users/* (avatar upload/serve) ke user-service. nginx otomatis milih
    # prefix location TERPANJANG yang cocok (jadi urutan taruh di sini gak wajib),
    # tapi ditulis di atas /api/ biar jelas ini sengaja dipisah, bukan kebetulan.
    location /api/users/ {
        proxy_pass http://user-service:8081/api/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Sisanya /api/* diteruskan ke auth-service (service name dari docker-compose).
    # Karena frontend & backend jadi 1 origin lewat sini, CORS gak perlu dipikirin di production.
    location /api/ {
        proxy_pass http://auth-service:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Sisanya serve React SPA. try_files fallback ke index.html supaya
    # client-side routing (react-router) gak 404 pas direct-refresh di /dashboard.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
