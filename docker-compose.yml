services:
  # Postgres tunggal (tanpa master-slave/pgpool), tapi bikin 2 database
  # (auth_db, user_db) lewat init script -> tetap "database per service".
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: auth_db,user_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      USER_SERVICE_ADDR: user-service:50052
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started

  # SeaweedFS = blob storage buat avatar. `weed server -s3` gabungin
  # master+volume+filer+s3-gateway jadi 1 proses/container — paling simpel
  # buat latihan (di production biasanya dipecah jadi container terpisah
  # per komponen supaya volume server bisa di-scale sendiri).
  # Auth di-skip (jalan di "Allow-All Mode") karena ini cuma latihan.
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -dir=/data
    volumes:
      - seaweedfs-data:/data

  # user-service: nyimpen profil (email/username/role/avatar), diisi lewat gRPC
  # CreateUser yang dipanggil auth-service. gRPC gak di-expose ke host (cuma
  # dipanggil internal via docker network), tapi HTTP-nya DI-proxy nginx
  # (lihat frontend/nginx.conf) buat endpoint avatar — avatar itu data profil,
  # jadi ownernya user-service, bukan auth-service. Validasi JWT dilakukan
  # sendiri di sini (JWT_SECRET harus sama persis dengan punya auth-service).
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: user_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SEAWEEDFS_S3_ENDPOINT: http://seaweedfs:8333
      SEAWEEDFS_BUCKET: avatars
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_started

  # nginx = reverse proxy tunggal: serve frontend static build + proxy
  # /api/users ke user-service, sisanya /api ke auth-service.
  # Ini satu-satunya container yang expose port ke host.
  nginx:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - user-service

volumes:
  pgdata:
  seaweedfs-data:
